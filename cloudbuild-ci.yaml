# Cloud Build: PR validation — lint + typecheck + build + test.
# Triggered on every push to a branch other than main (see the
# `atlas_ci` trigger in infrastructure/cloudbuild.tf). No docker build,
# no push, no deploy — this config is validation-only.
#
# Step topology is `install → build → (lint, typecheck, test, test-integration)`.
# `build` is on the critical path so that downstream steps hit Turbo's
# `/workspace/.turbo/cache` for `^build` of their upstream workspace
# deps instead of re-compiling `@atlas/logger` / `@atlas/schemas` /
# `@atlas/api` four times in parallel (which is what happens if lint,
# typecheck, test, and test-integration all `waitFor: ["install"]`).
#
# The `build` task's VITE env vars live on `web#build` in turbo.json,
# not the global `build` task — otherwise every package's build hash
# includes those vars and the cache built by this step is useless to a
# subsequent step that doesn't set them.

substitutions:
  _VITE_API_URL: "http://localhost:4111"
  _VITE_FRONTEND_URL: "http://localhost:3000"
  _VITE_SHOW_DEBUG_SNAPSHOTS: "false"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - name: node:22-bookworm-slim
    id: install
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm install --frozen-lockfile

  - name: node:22-bookworm-slim
    id: build
    entrypoint: bash
    env:
      - "VITE_API_URL=${_VITE_API_URL}"
      - "VITE_FRONTEND_URL=${_VITE_FRONTEND_URL}"
      - "VITE_SHOW_DEBUG_SNAPSHOTS=${_VITE_SHOW_DEBUG_SNAPSHOTS}"
    args:
      - -c
      - |
        set -e
        corepack enable
        pnpm build
    waitFor: ["install"]

  - name: node:22-bookworm-slim
    id: lint
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        corepack enable
        pnpm lint
    waitFor: ["build"]

  - name: node:22-bookworm-slim
    id: typecheck
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        corepack enable
        pnpm typecheck
    waitFor: ["build"]

  # Unit tests: `pnpm test` → `turbo run test`, fans out to every
  # workspace that defines a `test` script. Packages without one are
  # silently skipped, so adding tests to a new service is just "add a
  # `test` script". Fast, no containers, no external services.
  - name: node:22-bookworm-slim
    id: test
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        corepack enable
        pnpm test
    waitFor: ["build"]

  # Integration tests: boot Postgres + the Cloud Tasks emulator via
  # Testcontainers. Cloud Build's VM auto-mounts `/var/run/docker.sock`
  # into every step, so we only need the docker CLI in the step image —
  # installed inline with `apt-get install docker.io` (~20s). Routed
  # through Turbo (`test:integration` task, `cache: false`) so that
  # (a) `^build` deps are guaranteed present before vitest imports
  # `@atlas/logger` / `@atlas/schemas` and (b) adding integration tests
  # to another workspace in future is the same "add a script" pattern.
  #
  # First run on a fresh worker pulls `pgvector/pgvector:pg17` (~400MB)
  # + the cloud-tasks-emulator image; expect ~60–90s added that time.
  - name: node:22-bookworm-slim
    id: test-integration
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends docker.io ca-certificates
        corepack enable
        pnpm turbo run test:integration
    waitFor: ["build"]

timeout: 1500s
