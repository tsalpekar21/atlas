# Cloud Build: build atlas-api image and deploy to Cloud Run
# Triggered by push to the configured branch (e.g. main).
# Substitutions _REGION, _SERVICE, _REPO are set by the Terraform-managed trigger.
# Uses repo-root context with the API Dockerfile:
#   docker build -f apps/api/Dockerfile .
# DATABASE_URL for db:migrate comes from Secret Manager (secret id: atlas-api-database-url).

substitutions:
  _REGION: us-central1
  _SERVICE: atlas-api
  _REPO: atlas

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/atlas-api-database-url/versions/latest
      env: DATABASE_URL

steps:
  # Build image from repo root context
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - "build"
      - "-f"
      - "apps/api/Dockerfile"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: push
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}"
    waitFor: ["build"]

  # Run Drizzle migrations (same image as deploy; after push, before Cloud Run deploy)
  - name: "gcr.io/cloud-builders/docker"
    id: migrate
    entrypoint: bash
    args:
      - -c
      - |
        docker run --rm \
          -e DATABASE_URL \
          "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}" \
          npm run db:migrate
    secretEnv: ["DATABASE_URL"]
    waitFor: ["push"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
    waitFor: ["migrate"]

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"
